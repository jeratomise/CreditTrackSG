<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020617"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="glow2" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="badge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="60%" style="stop-color:#e2e8f0"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="80"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#4f46e5" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Ambient glows -->
  <ellipse cx="200" cy="150" rx="500" ry="400" fill="url(#glow1)" filter="url(#blur1)"/>
  <ellipse cx="1100" cy="520" rx="450" ry="350" fill="url(#glow2)" filter="url(#blur2)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="213" y1="0" x2="213" y2="640"/>
    <line x1="426" y1="0" x2="426" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="854" y1="0" x2="854" y2="640"/>
    <line x1="1067" y1="0" x2="1067" y2="640"/>
  </g>

  <!-- Shield icon background -->
  <rect x="88" y="96" width="72" height="72" rx="20" fill="url(#badge)" filter="url(#shadow)" opacity="0.95"/>
  <!-- Shield shape -->
  <path d="M124 110 L148 120 L148 144 Q148 158 124 166 Q100 158 100 144 L100 120 Z" fill="white" opacity="0.95"/>
  <path d="M115 138 L121 144 L133 132" stroke="#4f46e5" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- EliteX badge -->
  <rect x="88" y="185" width="150" height="24" rx="12" fill="#4f46e5" opacity="0.15" stroke="#4f46e5" stroke-width="1" stroke-opacity="0.3"/>
  <text x="163" y="201" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="700" fill="#818cf8" text-anchor="middle" letter-spacing="2">ELITEX.CC · 2026</text>

  <!-- Main title -->
  <text x="88" y="300" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="92" font-weight="900" fill="url(#titleGrad)" letter-spacing="-3">CreditTrack</text>

  <!-- Tagline -->
  <text x="90" y="358" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="400" fill="#94a3b8" letter-spacing="0.5">Singapore's mobile-first credit card miles tracker</text>

  <!-- Divider -->
  <rect x="88" y="388" width="80" height="3" rx="2" fill="url(#badge)" opacity="0.8"/>

  <!-- Feature pills -->
  <g font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="600">
    <!-- AI Extraction -->
    <rect x="88" y="412" width="170" height="36" rx="18" fill="#4f46e5" opacity="0.12" stroke="#4f46e5" stroke-width="1" stroke-opacity="0.35"/>
    <circle cx="115" cy="430" r="5" fill="#fbbf24"/>
    <text x="130" y="435" fill="#a5b4fc">AI Bill Extraction</text>

    <!-- Miles Strategy -->
    <rect x="272" y="412" width="190" height="36" rx="18" fill="#4f46e5" opacity="0.12" stroke="#4f46e5" stroke-width="1" stroke-opacity="0.35"/>
    <circle cx="299" cy="430" r="5" fill="#34d399"/>
    <text x="314" y="435" fill="#a5b4fc">Miles Optimisation</text>

    <!-- Smart Reminders -->
    <rect x="476" y="412" width="180" height="36" rx="18" fill="#4f46e5" opacity="0.12" stroke="#4f46e5" stroke-width="1" stroke-opacity="0.35"/>
    <circle cx="503" cy="430" r="5" fill="#60a5fa"/>
    <text x="518" y="435" fill="#a5b4fc">Smart Reminders</text>

    <!-- Mobile First -->
    <rect x="670" y="412" width="150" height="36" rx="18" fill="#4f46e5" opacity="0.12" stroke="#4f46e5" stroke-width="1" stroke-opacity="0.35"/>
    <circle cx="697" cy="430" r="5" fill="#f472b6"/>
    <text x="712" y="435" fill="#a5b4fc">Mobile-First</text>
  </g>

  <!-- Stats row -->
  <g font-family="'Inter', 'Helvetica Neue', Arial, sans-serif">
    <text x="88" y="520" font-size="42" font-weight="900" fill="white">7+</text>
    <text x="88" y="546" font-size="12" font-weight="600" fill="#475569" letter-spacing="2">BANKS</text>

    <line x1="178" y1="500" x2="178" y2="552" stroke="#1e293b" stroke-width="1.5"/>

    <text x="198" y="520" font-size="42" font-weight="900" fill="white">AI</text>
    <text x="198" y="546" font-size="12" font-weight="600" fill="#475569" letter-spacing="2">POWERED</text>

    <line x1="278" y1="500" x2="278" y2="552" stroke="#1e293b" stroke-width="1.5"/>

    <text x="298" y="520" font-size="42" font-weight="900" fill="white">0</text>
    <text x="298" y="546" font-size="12" font-weight="600" fill="#475569" letter-spacing="2">MANUAL ENTRY</text>

    <line x1="458" y1="500" x2="458" y2="552" stroke="#1e293b" stroke-width="1.5"/>

    <text x="478" y="520" font-size="42" font-weight="900" fill="white">📱</text>
    <text x="478" y="546" font-size="12" font-weight="600" fill="#475569" letter-spacing="2">MOBILE-FIRST</text>
  </g>

  <!-- Tech stack pills (bottom right) -->
  <g font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="600" text-anchor="middle">
    <rect x="832" y="490" width="80" height="28" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="872" y="509" fill="#64748b">React 18</text>

    <rect x="924" y="490" width="80" height="28" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="964" y="509" fill="#64748b">Supabase</text>

    <rect x="1016" y="490" width="80" height="28" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="1056" y="509" fill="#64748b">Gemini AI</text>

    <rect x="1108" y="490" width="80" height="28" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="1148" y="509" fill="#64748b">Vercel</text>

    <rect x="878" y="530" width="80" height="28" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="918" y="549" fill="#64748b">Resend</text>

    <rect x="970" y="530" width="80" height="28" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="1010" y="549" fill="#64748b">TypeScript</text>

    <rect x="1062" y="530" width="80" height="28" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="1102" y="549" fill="#64748b">Tailwind</text>
  </g>

  <!-- Live badge -->
  <rect x="1100" y="96" width="100" height="32" rx="16" fill="#052e16" stroke="#166534" stroke-width="1"/>
  <circle cx="1122" cy="112" r="5" fill="#4ade80">
    <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="1150" y="117" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="700" fill="#4ade80" text-anchor="middle">LIVE</text>
</svg>
